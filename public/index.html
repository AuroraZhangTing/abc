<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产学研项目管理系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
:root{--bg:#f4efe7;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e7dccb;--brand:#0f766e;--brand2:#1e3a5f;--warning:#d97706;--danger:#dc2626;--success:#16a34a}
body{margin:0;font-family:Arial,Microsoft YaHei,sans-serif;background:linear-gradient(180deg,#fbf8f3,#f2ecdf);color:var(--ink)}
.shell{max-width:1600px;margin:0 auto;padding:20px}
.hero,.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 34px rgba(15,23,42,.07)}
.hero{padding:24px;background:linear-gradient(135deg,rgba(15,118,110,.98),rgba(30,58,95,.96));color:#fff}
.hero .muted{color:rgba(255,255,255,.72)}
.form-control,.form-select{border-radius:12px;border-color:#d7cbb9;min-height:42px}
.section-title{font-size:1.1rem;font-weight:800}
.muted{color:var(--muted)}
.badge-soft{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:.25rem}
.badge-warning{background:#fff2db;color:#b45309}.badge-success{background:#e8f6eb;color:#15803d}.badge-danger{background:#fee2e2;color:#b91c1c}.badge-neutral{background:#eef2f7;color:#475569}.badge-primary{background:#d9f3ef;color:#0f766e}
.layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:18px}
.sidebar{position:sticky;top:18px;height:fit-content;padding:18px}
.nav-link-item{display:block;padding:12px 14px;border-radius:14px;color:#334155;text-decoration:none;font-weight:700}
.nav-link-item:hover,.nav-link-item.active{background:#edf7f5;color:var(--brand)}
.panel{padding:18px}
.table-modern th{background:#f8f3ea}.table-modern td,.table-modern th{padding:12px;border-color:#eee6da;vertical-align:middle}
.sub{border:1px dashed var(--line);border-radius:18px;padding:14px;background:#fffdf8}
.stepper{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.step{padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff}.step.active{background:#d9f3ef}.step.done{background:#ecfdf3}.step.overdue{background:#fee2e2}
.small-btn{border-radius:999px;padding:.35rem .8rem}
.sticky-actions{position:sticky;bottom:12px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);padding:12px;border:1px solid var(--line);border-radius:16px}
.file-link{font-size:12px;color:var(--brand)}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}.dot-warning{background:var(--warning)}.dot-success{background:var(--success)}.dot-danger{background:var(--danger)}.dot-neutral{background:#94a3b8}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{position:static}.stepper{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:768px){.shell{padding:14px}.stepper{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:576px){.stepper{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app" class="shell" v-cloak>
  <section class="hero mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-lg-7">
        <div class="small text-white-50 fw-bold">Industry · Academia · Research</div>
        <h1 class="mt-2 mb-2 fw-bold">产学研项目管理系统</h1>
        <div class="muted">Node.js + JSON 本地存储版，支持项目流程、提交锁定、管理员面板、文件上传和免费平台部署。</div>
      </div>
      <div class="col-lg-5">
        <div class="row g-2 align-items-end">
          <div class="col-4"><label class="form-label text-white-50">角色</label><select class="form-select" v-model="session.role" @change="switchRole"><option value="admin">管理员</option><option value="executor">执行人</option><option value="viewer">查看者</option></select></div>
          <div class="col-4"><label class="form-label text-white-50">用户</label><select class="form-select" v-model.number="session.userId" @change="selectSessionUser"><option v-for="u in users" :key="u.id" :value="u.id">{{ u.realName }} ({{ roleLabel(u.role) }})</option></select></div>
          <div class="col-4"><label class="form-label text-white-50">项目</label><select class="form-select" v-model.number="selectedProjectId" @change="loadProject"><option v-for="p in projects" :key="p.id" :value="p.id">{{ p.projectName }}</option></select></div>
        </div>
      </div>
    </div>
  </section>

  <section v-if="needsSetup" class="panel mb-4">
    <div class="section-title mb-2">系统首次初始化</div>
    <div class="muted mb-3">当前系统没有用户，请先创建首个管理员。</div>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">管理员账号</label><input class="form-control" v-model="setupForm.username"></div>
      <div class="col-md-4"><label class="form-label">管理员姓名</label><input class="form-control" v-model="setupForm.real_name"></div>
      <div class="col-md-4 d-flex align-items-end"><button class="btn btn-primary w-100" @click="createInitialAdmin">创建首个管理员</button></div>
    </div>
  </section>

  <section v-else-if="!loggedIn" class="row g-4 mb-4">
    <div class="col-lg-5">
      <div class="panel">
        <div class="section-title mb-2">登录</div>
        <div class="muted mb-3">当前版本采用轻量账号选择登录，无需密码。</div>
        <div class="mb-3"><label class="form-label">选择账号</label><select class="form-select" v-model.number="session.userId"><option v-for="u in users" :key="u.id" :value="u.id">{{ u.realName }} ({{ roleLabel(u.role) }})</option></select></div>
        <div class="d-flex gap-2 flex-wrap"><button class="btn btn-primary" @click="login">进入系统</button><button class="btn btn-outline-secondary" @click="reloadAll">重新加载</button></div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="panel h-100">
        <div class="section-title mb-2">系统状态</div>
        <div class="row g-3">
          <div class="col-md-4"><div class="sub"><div class="muted small">用户数</div><div class="display-6 fw-bold">{{ users.length }}</div></div></div>
          <div class="col-md-4"><div class="sub"><div class="muted small">项目数</div><div class="display-6 fw-bold">{{ projects.length }}</div></div></div>
          <div class="col-md-4"><div class="sub"><div class="muted small">当前进度</div><div class="fw-bold mt-2">{{ currentProject ? currentProject.currentStageLabel : '无项目' }}</div></div></div>
        </div>
      </div>
    </div>
  </section>

  <template v-else>
    <section class="row g-3 mb-4">
      <div class="col-md-6 col-xl-3" v-for="s in stats" :key="s.label"><div class="panel h-100"><div class="muted small">{{ s.label }}</div><div class="display-6 fw-bold">{{ s.value }}</div><div class="small mt-2" :class="s.className">{{ s.hint }}</div></div></div>
    </section>

    <div class="layout">
      <aside class="panel sidebar">
        <div class="section-title mb-3">菜单</div>
        <a class="nav-link-item" href="#home" :class="{active:view==='home'}" @click.prevent="view='home'">首页</a>
        <a class="nav-link-item" href="#projects" :class="{active:view==='projects'}" @click.prevent="view='projects'">项目管理</a>
        <a class="nav-link-item" href="#contract" :class="{active:view==='contract'}" @click.prevent="view='contract'">合同管理</a>
        <a class="nav-link-item" href="#fund" :class="{active:view==='fund'}" @click.prevent="view='fund'">经费认领</a>
        <a class="nav-link-item" href="#invoice" :class="{active:view==='invoice'}" @click.prevent="view='invoice'">发票管理</a>
        <a class="nav-link-item" href="#closure" :class="{active:view==='closure'}" @click.prevent="view='closure'">项目结题</a>
        <a class="nav-link-item" href="#admin" :class="{active:view==='admin'}" @click.prevent="view='admin'" v-if="isAdmin">管理员面板</a>
        <div class="mt-4 sub">
          <div class="muted small">当前用户</div>
          <div class="fw-bold">{{ sessionUser.realName }}</div>
          <div class="small">{{ roleLabel(sessionUser.role) }}</div>
          <button class="btn btn-outline-secondary btn-sm mt-3 w-100" @click="logout">退出登录</button>
        </div>
      </aside>

      <main>
        <section class="panel mb-4" id="home">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
            <div><div class="section-title">首页项目总览看板</div><div class="muted">所有角色只读查看项目总体状态、金额和当前阶段。</div></div>
            <span class="badge-soft badge-neutral">只读总览</span>
          </div>
          <div class="table-responsive">
            <table class="table table-modern mb-0">
              <thead><tr><th>项目名称</th><th>合作企业</th><th>负责人</th><th>当前阶段</th><th>项目状态</th><th>虚拟账户金额</th><th>操作</th></tr></thead>
              <tbody>
                <tr v-for="p in projects" :key="p.id">
                  <td>{{ p.projectName }}</td><td>{{ p.enterpriseName }}</td><td>{{ p.projectLeader }}</td><td>{{ p.currentStageLabel }}</td><td><span class="badge-soft" :class="statusClass(p.status)">{{ p.status }}</span></td><td>￥{{ money(p.virtualAccountAmount) }}</td><td><button class="btn btn-outline-primary btn-sm" @click="selectProjectId(p.id)">查看</button></td>
                </tr>
                <tr v-if="!projects.length"><td colspan="7" class="text-center muted py-4">暂无项目，管理员可先创建一个项目。</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel mb-4" id="projects">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
            <div><div class="section-title">项目管理</div><div class="muted">创建项目、查看详情、推进流程。</div></div>
            <span class="badge-soft badge-primary">当前阶段：{{ currentProject ? currentProject.currentStageLabel : '无' }}</span>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-4"><label class="form-label">项目名称</label><input class="form-control" v-model="projectForm.project_name"></div>
            <div class="col-md-4"><label class="form-label">合作企业</label><input class="form-control" v-model="projectForm.enterprise_name"></div>
            <div class="col-md-4"><label class="form-label">项目负责人</label><input class="form-control" v-model="projectForm.project_leader"></div>
            <div class="col-md-4"><label class="form-label">启动时间</label><input class="form-control" type="date" v-model="projectForm.start_time"></div>
            <div class="col-md-4"><label class="form-label">虚拟账户金额</label><input class="form-control" type="number" v-model.number="projectForm.virtual_account_amount"></div>
            <div class="col-md-4"><label class="form-label">备注</label><input class="form-control" v-model="projectForm.remark"></div>
          </div>
          <div class="d-flex gap-2 flex-wrap mb-3">
            <button class="btn btn-primary" @click="createProject" :disabled="!canCreateProject">新增项目</button>
            <button class="btn btn-outline-secondary" @click="reloadProjects">刷新项目</button>
            <button class="btn btn-outline-danger" @click="deleteCurrentProject" :disabled="!isAdmin || !currentProject">删除当前项目</button>
          </div>
          <div class="row g-3">
            <div class="col-lg-4">
              <div class="sub h-100" style="max-height:320px;overflow:auto">
                <div class="fw-bold mb-2">项目列表</div>
                <div v-for="p in projects" :key="p.id" class="mb-2 p-2 rounded-3 border" :class="{'bg-light': selectedProjectId===p.id}">
                  <div class="fw-semibold">{{ p.projectName }}</div>
                  <div class="small muted">{{ p.enterpriseName }}</div>
                  <div class="small">{{ p.currentStageLabel }} · <span :class="statusDotClass(p.status)"></span>{{ p.status }}</div>
                  <button class="btn btn-sm btn-outline-primary mt-2" @click="selectProjectId(p.id)">打开</button>
                </div>
              </div>
            </div>
            <div class="col-lg-8" v-if="currentProject">
              <div class="sub h-100">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                  <div><div class="fw-bold fs-5">{{ currentProject.project.projectName }}</div><div class="muted">{{ currentProject.project.enterpriseName }} · {{ currentProject.project.projectLeader }}</div></div>
                  <div class="text-end"><div class="badge-soft badge-primary">{{ currentProject.currentStageLabel }}</div><div class="small mt-1" :class="currentProject.overdue ? 'text-danger' : 'text-success'">{{ currentProject.overdue ? '已逾期' : '正常' }}</div></div>
                </div>
                <div class="stepper mb-3"><div v-for="s in stages" :key="s.code" class="step" :class="stageClass(s.code)"><div class="small muted">{{ s.code }}</div><div class="fw-bold">{{ s.label }}</div><div class="small">{{ stageStatusText(currentProject.project, s.code) }}</div></div></div>
                <div class="row g-3">
                  <div class="col-md-4"><label class="form-label">项目名称</label><input class="form-control" v-model="currentProject.project.projectName" :disabled="!canEdit('project_info')"></div>
                  <div class="col-md-4"><label class="form-label">合作企业</label><input class="form-control" v-model="currentProject.project.enterpriseName" :disabled="!canEdit('project_info')"></div>
                  <div class="col-md-4"><label class="form-label">项目负责人</label><input class="form-control" v-model="currentProject.project.projectLeader" :disabled="!canEdit('project_info')"></div>
                  <div class="col-md-4"><label class="form-label">启动时间</label><input class="form-control" type="date" v-model="currentProject.project.startTime" :disabled="!canEdit('project_info')"></div>
                  <div class="col-md-4"><label class="form-label">虚拟账户金额</label><input class="form-control" type="number" v-model.number="currentProject.project.virtualAccountAmount" :disabled="!canEdit('project_info')"></div>
                  <div class="col-md-4"><label class="form-label">备注</label><input class="form-control" v-model="currentProject.project.remark" :disabled="!canEdit('project_info')"></div>
                </div>
                <div class="mt-3 d-flex gap-2 flex-wrap"><button class="btn btn-primary" @click="saveProjectInfo" :disabled="!canEdit('project_info')">保存基础信息</button><button class="btn btn-outline-primary" @click="submitStage('project_info')" :disabled="!canSubmit('project_info')">提交基础信息</button></div>
              </div>
            </div>
          </div>
        </section>
        <section class="panel mb-4" id="contract" v-if="currentProject">
          <div class="section-title mb-2">合同管理</div>
          <div class="muted mb-3">合同定稿、盖章、寄送与签收，三个子步骤按顺序提交。</div>
          <div class="sub mb-3">
            <div class="fw-bold mb-2">1. 合同定稿</div>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">责任人</label><input class="form-control" v-model="currentProject.project.contract.draft.responsibleName" :disabled="!canEdit('contract_draft')"></div>
              <div class="col-md-4"><label class="form-label">定稿日期</label><input class="form-control" type="date" v-model="currentProject.project.contract.draft.date" :disabled="!canEdit('contract_draft')"></div>
              <div class="col-md-4"><label class="form-label">备注</label><input class="form-control" v-model="currentProject.project.contract.draft.remark" :disabled="!canEdit('contract_draft')"></div>
              <div class="col-12"><label class="form-label">上传合同文件</label><input type="file" class="form-control" @change="uploadFile($event, 'contract_draft', 'draft')" :disabled="!canEdit('contract_draft')"></div>
              <div class="col-12"><div class="small muted">文件：<a v-if="currentProject.project.contract.draft.fileName" :href="fileUrl(currentProject.project.contract.draft.fileId)" target="_blank" class="file-link">{{ currentProject.project.contract.draft.fileName }}</a><span v-else>未上传</span></div></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('contract_draft')" :disabled="!canEdit('contract_draft')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('contract_draft')" :disabled="!canSubmit('contract_draft')">提交</button></div>
          </div>
          <div class="sub mb-3">
            <div class="fw-bold mb-2">2. 合同盖章</div>
            <div class="row g-3">
              <div class="col-md-3"><label class="form-label">合同份数</label><input class="form-control" type="number" v-model.number="currentProject.project.contract.stamp.copies" :disabled="!canEdit('contract_stamp')"></div>
              <div class="col-md-3"><label class="form-label">是否盖章</label><select class="form-select" v-model="currentProject.project.contract.stamp.isStamped" :disabled="!canEdit('contract_stamp')"><option :value="true">是</option><option :value="false">否</option></select></div>
              <div class="col-md-3"><label class="form-label">是否扫描</label><select class="form-select" v-model="currentProject.project.contract.stamp.isScanned" :disabled="!canEdit('contract_stamp')"><option :value="true">是</option><option :value="false">否</option></select></div>
              <div class="col-md-3"><label class="form-label">是否上传系统</label><select class="form-select" v-model="currentProject.project.contract.stamp.isUploaded" :disabled="!canEdit('contract_stamp')"><option :value="true">是</option><option :value="false">否</option></select></div>
              <div class="col-md-6"><label class="form-label">盖章责任人</label><input class="form-control" v-model="currentProject.project.contract.stamp.responsibleName" :disabled="!canEdit('contract_stamp')"></div>
              <div class="col-md-6"><label class="form-label">盖章日期</label><input class="form-control" type="date" v-model="currentProject.project.contract.stamp.date" :disabled="!canEdit('contract_stamp')"></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('contract_stamp')" :disabled="!canEdit('contract_stamp')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('contract_stamp')" :disabled="!canSubmit('contract_stamp')">提交</button></div>
          </div>
          <div class="sub">
            <div class="fw-bold mb-2">3. 合同寄送与签收</div>
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">快递单号</label><input class="form-control" v-model="currentProject.project.contract.delivery.trackingNo" :disabled="!canEdit('contract_delivery')"></div>
              <div class="col-md-4"><label class="form-label">寄出日期</label><input class="form-control" type="date" v-model="currentProject.project.contract.delivery.date" :disabled="!canEdit('contract_delivery')"></div>
              <div class="col-md-4"><label class="form-label">责任人</label><input class="form-control" v-model="currentProject.project.contract.delivery.responsibleName" :disabled="!canEdit('contract_delivery')"></div>
              <div class="col-md-4"><label class="form-label">客户是否确认</label><select class="form-select" v-model="currentProject.project.contract.delivery.customerConfirmed" :disabled="!canEdit('contract_delivery')"><option :value="true">是</option><option :value="false">否</option></select></div>
              <div class="col-md-4"><label class="form-label">签收截图</label><input class="form-control" v-model="currentProject.project.contract.delivery.receiptFileName" disabled></div>
              <div class="col-md-4"><label class="form-label">客户确认截图</label><input class="form-control" v-model="currentProject.project.contract.delivery.customerConfirmFileName" disabled></div>
              <div class="col-md-6"><label class="form-label">上传签收截图</label><input type="file" class="form-control" @change="uploadFile($event, 'contract_delivery', 'receipt')" :disabled="!canEdit('contract_delivery')"></div>
              <div class="col-md-6"><label class="form-label">上传客户确认截图</label><input type="file" class="form-control" @change="uploadFile($event, 'contract_delivery', 'customerConfirm')" :disabled="!canEdit('contract_delivery')"></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('contract_delivery')" :disabled="!canEdit('contract_delivery')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('contract_delivery')" :disabled="!canSubmit('contract_delivery')">提交</button></div>
          </div>
        </section>

        <section class="panel mb-4" id="fund" v-if="currentProject">
          <div class="section-title mb-2">经费认领</div>
          <div class="sub">
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">责任人</label><input class="form-control" v-model="currentProject.project.fundClaim.responsibleName" :disabled="!canEdit('fund_claim')"></div>
              <div class="col-md-4"><label class="form-label">认领日期</label><input class="form-control" type="date" v-model="currentProject.project.fundClaim.date" :disabled="!canEdit('fund_claim')"></div>
              <div class="col-md-4"><label class="form-label">银行流水单号</label><input class="form-control" v-model="currentProject.project.fundClaim.bankFlowNo" :disabled="!canEdit('fund_claim')"></div>
              <div class="col-md-4"><label class="form-label">到账状态</label><select class="form-select" v-model="currentProject.project.fundClaim.arrivalStatus" :disabled="!canEdit('fund_claim')"><option>未到账</option><option>已到账</option></select></div>
              <div class="col-md-4"><label class="form-label">虚拟账户金额</label><input class="form-control" type="number" v-model.number="currentProject.project.fundClaim.virtualAmount" :disabled="!canEdit('fund_claim')"></div>
              <div class="col-md-4"><label class="form-label">客户打款截图</label><input class="form-control" v-model="currentProject.project.fundClaim.screenshotFileName" disabled></div>
              <div class="col-12"><label class="form-label">上传截图</label><input type="file" class="form-control" @change="uploadFile($event, 'fund_claim', 'screenshot')" :disabled="!canEdit('fund_claim')"></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('fund_claim')" :disabled="!canEdit('fund_claim')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('fund_claim')" :disabled="!canSubmit('fund_claim')">提交</button></div>
          </div>
        </section>
        <section class="panel mb-4" id="invoice" v-if="currentProject">
          <div class="section-title mb-2">发票管理</div>
          <div class="sub">
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">发票类型</label><select class="form-select" v-model="currentProject.project.invoice.invoiceType" :disabled="!canEdit('invoice')"><option>普票</option><option>专票</option></select></div>
              <div class="col-md-4"><label class="form-label">开票责任人</label><input class="form-control" v-model="currentProject.project.invoice.responsibleName" :disabled="!canEdit('invoice')"></div>
              <div class="col-md-4"><label class="form-label">开票日期</label><input class="form-control" type="date" v-model="currentProject.project.invoice.date" :disabled="!canEdit('invoice')"></div>
              <div class="col-md-4"><label class="form-label">客户确认状态</label><select class="form-select" v-model="currentProject.project.invoice.customerConfirmStatus" :disabled="!canEdit('invoice')"><option>待确认</option><option>已确认</option></select></div>
              <div class="col-md-4"><label class="form-label">发票发送状态</label><select class="form-select" v-model="currentProject.project.invoice.sendStatus" :disabled="!canEdit('invoice')"><option>未发送</option><option>已发送</option><option>已接收</option></select></div>
              <div class="col-md-4"><label class="form-label">发票预览图</label><input class="form-control" v-model="currentProject.project.invoice.previewFileName" disabled></div>
              <div class="col-12"><label class="form-label">上传发票预览图</label><input type="file" class="form-control" @change="uploadFile($event, 'invoice', 'preview')" :disabled="!canEdit('invoice')"></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('invoice')" :disabled="!canEdit('invoice')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('invoice')" :disabled="!canSubmit('invoice')">提交</button></div>
          </div>
        </section>

        <section class="panel mb-4" id="closure" v-if="currentProject">
          <div class="section-title mb-2">项目结题</div>
          <div class="sub">
            <div class="row g-3">
              <div class="col-md-4"><label class="form-label">结题负责人</label><input class="form-control" v-model="currentProject.project.closure.responsibleName" :disabled="!canEdit('closure')"></div>
              <div class="col-md-4"><label class="form-label">结题日期</label><input class="form-control" type="date" v-model="currentProject.project.closure.date" :disabled="!canEdit('closure')"></div>
              <div class="col-md-4"><label class="form-label">结题状态</label><select class="form-select" v-model="currentProject.project.closure.closureStatus" :disabled="!canEdit('closure')"><option>未结题</option><option>已结题</option></select></div>
              <div class="col-md-6"><label class="form-label">结题报告</label><input class="form-control" v-model="currentProject.project.closure.reportFileName" disabled></div>
              <div class="col-md-6"><label class="form-label">上传结题报告</label><input type="file" class="form-control" @change="uploadFile($event, 'closure', 'report')" :disabled="!canEdit('closure')"></div>
            </div>
            <div class="mt-3 d-flex gap-2"><button class="btn btn-primary btn-sm" @click="saveStage('closure')" :disabled="!canEdit('closure')">保存</button><button class="btn btn-outline-primary btn-sm" @click="submitStage('closure')" :disabled="!canSubmit('closure')">提交</button></div>
          </div>
        </section>

        <section class="panel mb-4" id="admin" v-if="isAdmin">
          <div class="section-title mb-2">管理员面板</div>
          <div class="muted mb-3">可管理用户、删除项目、重置阶段。</div>
          <div class="row g-4">
            <div class="col-lg-6">
              <div class="sub h-100">
                <div class="fw-bold mb-2">用户管理</div>
                <div class="row g-3 mb-3">
                  <div class="col-md-6"><label class="form-label">账号</label><input class="form-control" v-model="userForm.username"></div>
                  <div class="col-md-6"><label class="form-label">姓名</label><input class="form-control" v-model="userForm.real_name"></div>
                  <div class="col-md-6"><label class="form-label">角色</label><select class="form-select" v-model="userForm.role"><option value="admin">管理员</option><option value="executor">执行人</option><option value="viewer">查看者</option></select></div>
                  <div class="col-md-6"><label class="form-label">状态</label><select class="form-select" v-model.number="userForm.status"><option :value="1">启用</option><option :value="0">停用</option></select></div>
                </div>
                <div class="d-flex gap-2 flex-wrap mb-3"><button class="btn btn-primary btn-sm" @click="createUser">新增用户</button><button class="btn btn-outline-secondary btn-sm" @click="reloadUsers">刷新用户</button></div>
                <div class="table-responsive" style="max-height:320px;overflow:auto">
                  <table class="table table-modern mb-0">
                    <thead><tr><th>账号</th><th>姓名</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody>
                      <tr v-for="u in users" :key="u.id">
                        <td><input class="form-control form-control-sm" v-model="u.username"></td>
                        <td><input class="form-control form-control-sm" v-model="u.realName"></td>
                        <td><select class="form-select form-select-sm" v-model="u.role"><option value="admin">管理员</option><option value="executor">执行人</option><option value="viewer">查看者</option></select></td>
                        <td><select class="form-select form-select-sm" v-model.number="u.status"><option :value="1">启用</option><option :value="0">停用</option></select></td>
                        <td class="text-nowrap"><button class="btn btn-outline-primary btn-sm me-1" @click="updateUser(u)">保存</button><button class="btn btn-outline-danger btn-sm" @click="deleteUser(u.id)">删</button></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="sub h-100">
                <div class="fw-bold mb-2">阶段重置</div>
                <div class="row g-3 mb-3">
                  <div class="col-md-6"><label class="form-label">项目</label><select class="form-select" v-model.number="selectedProjectId" @change="loadProject"><option v-for="p in projects" :key="p.id" :value="p.id">{{ p.projectName }}</option></select></div>
                  <div class="col-md-6"><label class="form-label">阶段</label><select class="form-select" v-model="resetForm.stageCode"><option v-for="s in stages" :key="s.code" :value="s.code">{{ s.label }}</option></select></div>
                </div>
                <div class="d-flex gap-2 flex-wrap"><button class="btn btn-outline-warning btn-sm" @click="resetStage" :disabled="!currentProject">重置阶段</button><button class="btn btn-outline-danger btn-sm" @click="deleteCurrentProject" :disabled="!currentProject">删除当前项目</button></div>
                <div class="mt-3 muted small">重置后，普通用户可重新编辑该阶段，管理员始终可编辑所有阶段。</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel mb-4" id="files" v-if="currentProject">
          <div class="section-title mb-2">文件中心</div>
          <div class="sub" style="max-height:280px;overflow:auto">
            <div v-for="file in currentProject.files" :key="file.id" class="mb-3">
              <div class="fw-semibold">{{ file.fileName }}</div>
              <div class="small muted mb-1">{{ stageLabel(file.moduleCode) }} · {{ formatTime(file.uploadedAt) }}</div>
              <a class="file-link" :href="fileUrl(file.id)" target="_blank">打开 / 下载</a>
            </div>
            <div v-if="!currentProject.files.length" class="muted">当前项目暂无文件。</div>
          </div>
        </section>
      </main>
    </div>
  </template>
</div>
<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      users: [],
      projects: [],
      currentProject: null,
      selectedProjectId: null,
      needsSetup: false,
      loggedIn: false,
      view: 'home',
      session: JSON.parse(localStorage.getItem('ias_session') || 'null') || { userId: 0, role: 'viewer', realName: '访客' },
      setupForm: { username: 'admin', real_name: '项目管理员' },
      userForm: { username: '', real_name: '', role: 'executor', status: 1 },
      projectForm: { project_name: '', enterprise_name: '', project_leader: '', start_time: new Date().toISOString().slice(0,10), remark: '', virtual_account_amount: 0 },
      resetForm: { stageCode: 'project_info' },
      stages: [
        { code: 'project_info', label: '项目基础信息' },
        { code: 'contract_draft', label: '合同定稿' },
        { code: 'contract_stamp', label: '合同盖章' },
        { code: 'contract_delivery', label: '合同寄送与签收' },
        { code: 'fund_claim', label: '经费认领' },
        { code: 'invoice', label: '发票管理' },
        { code: 'closure', label: '项目结题' }
      ],
      message: ''
    };
  },
  computed:
  {
    sessionUser() { return this.users.find(u => u.id === this.session.userId) || { realName: this.session.realName || '访客', role: this.session.role || 'viewer' }; },
    isAdmin() { return this.session.role === 'admin'; },
    canCreateProject() { return this.session.role === 'admin' || this.session.role === 'executor'; },
    stats() {
      const total = this.projects.length;
      const inProgress = this.projects.filter(p => p.status === '进行中').length;
      const completed = this.projects.filter(p => p.status === '已完成').length;
      const overdue = this.projects.filter(p => p.status === '逾期').length;
      return [
        { label: '项目总数', value: total, hint: '支持所有项目浏览', className: 'text-success' },
        { label: '进行中', value: inProgress, hint: '流程正在推进', className: 'text-primary' },
        { label: '已完成', value: completed, hint: '已结题项目', className: 'text-success' },
        { label: '逾期', value: overdue, hint: '超期提醒', className: 'text-danger' }
      ];
    }
  },
  methods: {
    headers() {
      return {
        'Content-Type': 'application/json',
        'x-role': this.session.role,
        'x-user-id': String(this.session.userId || 0),
        'x-user-name': this.session.realName || '访客'
      };
    },
    async api(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...this.headers(), ...(options.headers || {}) } });
      const text = await res.text();
      const data = text ? (() => { try { return JSON.parse(text); } catch { return text; } })() : {};
      if (!res.ok) throw new Error((data && data.message) || '请求失败');
      return data;
    },
    roleLabel(role) { return ({ admin: '管理员', executor: '执行人', viewer: '查看者' })[role] || role; },
    formatTime(v) { return v ? new Date(v).toLocaleString('zh-CN') : ''; },
    money(v) { return Number(v || 0).toFixed(2); },
    statusClass(status) { return status === '已完成' ? 'badge-soft badge-success' : status === '逾期' ? 'badge-soft badge-danger' : 'badge-soft badge-warning'; },
    statusDotClass(status) { return status === '已完成' ? 'status-dot dot-success' : status === '逾期' ? 'status-dot dot-danger' : status === '进行中' ? 'status-dot dot-warning' : 'status-dot dot-neutral'; },
    stageLabel(code) { const s = this.stages.find(item => item.code === code); return s ? s.label : code; },
    stageClass(code) {
      if (!this.currentProject) return '';
      const order = this.stages.map(s => s.code);
      const idx = order.indexOf(code);
      const currentIdx = order.indexOf(this.currentProject.currentStage);
      if (code === this.currentProject.currentStage) return 'active';
      if (this.currentProject.overdue && code === 'closure') return 'overdue';
      return idx < currentIdx ? 'done' : '';
    },
    stageStatusText(project, code) {
      if (code === 'project_info') return project.projectInfo.submitted ? '已提交' : '待办';
      const map = { contract_draft: project.contract.draft, contract_stamp: project.contract.stamp, contract_delivery: project.contract.delivery, fund_claim: project.fundClaim, invoice: project.invoice, closure: project.closure };
      return map[code] && map[code].submitted ? '已提交' : '待办';
    },
    normalizeSessionFromUser(user) {
      this.session = { userId: user.id, role: user.role, realName: user.realName };
      localStorage.setItem('ias_session', JSON.stringify(this.session));
      this.loggedIn = true;
    },
    async loadBootstrap() {
      const data = await this.api('/api/bootstrap' + (this.selectedProjectId ? '?projectId=' + this.selectedProjectId : ''));
      this.users = data.users || [];
      this.projects = data.projects || [];
      this.needsSetup = !!data.needsSetup;
      if (this.session.userId && this.users.some(u => u.id === this.session.userId)) {
        const matched = this.users.find(u => u.id === this.session.userId);
        this.normalizeSessionFromUser(matched);
      }
      this.currentProject = data.detail || (this.projects[0] ? await this.api('/api/projects/' + this.projects[0].id) : null);
      this.selectedProjectId = this.currentProject ? this.currentProject.project.id : (this.projects[0] ? this.projects[0].id : null);
    },
    async reloadAll() { await this.loadBootstrap(); if (this.selectedProjectId) await this.loadProject(); },
    async reloadUsers() { await this.loadBootstrap(); },
    async reloadProjects() { await this.loadBootstrap(); },
    async login() {
      const user = this.users.find(u => u.id === Number(this.session.userId));
      if (!user) return;
      this.normalizeSessionFromUser(user);
      await this.reloadAll();
    },
    logout() {
      this.loggedIn = false;
      this.session = { userId: 0, role: 'viewer', realName: '访客' };
      localStorage.removeItem('ias_session');
    },
    switchRole() {
      const user = this.users.find(u => u.role === this.session.role) || this.users[0];
      if (user) {
        this.session.userId = user.id;
        this.session.realName = user.realName;
        localStorage.setItem('ias_session', JSON.stringify(this.session));
      }
    },
    selectSessionUser() {
      const user = this.users.find(u => u.id === Number(this.session.userId));
      if (user) {
        this.session.role = user.role;
        this.session.realName = user.realName;
        localStorage.setItem('ias_session', JSON.stringify(this.session));
      }
    },
    async createInitialAdmin() {
      try {
        this.message = '';
        const res = await this.api('/api/setup/admin', { method: 'POST', body: JSON.stringify(this.setupForm) });
        this.normalizeSessionFromUser(res.user);
        await this.reloadAll();
      } catch (error) { this.message = error.message; }
    },
    async createUser() {
      try {
        this.message = '';
        await this.api('/api/users', { method: 'POST', body: JSON.stringify(this.userForm) });
        this.userForm = { username: '', real_name: '', role: 'executor', status: 1 };
        await this.reloadUsers();
      } catch (error) { this.message = error.message; }
    },
    async updateUser(user) {
      try {
        this.message = '';
        await this.api('/api/users/' + user.id, { method: 'PUT', body: JSON.stringify(user) });
        await this.reloadUsers();
      } catch (error) { this.message = error.message; }
    },
    async deleteUser(id) {
      if (!confirm('确认删除该用户？')) return;
      try {
        this.message = '';
        await this.api('/api/users/' + id, { method: 'DELETE' });
        await this.reloadUsers();
      } catch (error) { this.message = error.message; }
    },
    async createProject() {
      try {
        this.message = '';
        const result = await this.api('/api/projects', { method: 'POST', body: JSON.stringify(this.projectForm) });
        this.selectedProjectId = result.project.id;
        await this.reloadAll();
      } catch (error) { this.message = error.message; }
    },
    async deleteCurrentProject() {
      if (!this.currentProject) return;
      if (!confirm('确认删除当前项目及其全部关联数据？')) return;
      try {
        this.message = '';
        await this.api('/api/projects/' + this.currentProject.project.id, { method: 'DELETE' });
        this.currentProject = null;
        this.selectedProjectId = this.projects[0] ? this.projects[0].id : null;
        await this.reloadAll();
      } catch (error) { this.message = error.message; }
    },
    async loadProject() {
      if (!this.selectedProjectId) return;
      this.currentProject = await this.api('/api/projects/' + this.selectedProjectId);
      await this.reloadProjects();
    },
    async selectProjectId(id) {
      this.selectedProjectId = id;
      await this.loadProject();
      this.view = 'projects';
    },
    canEdit(stageCode) {
      if (!this.currentProject) return false;
      if (this.isAdmin) return true;
      return !this.stageLocked(stageCode) && this.isStageOpen(stageCode, this.currentProject.project);
    },
    canSubmit(stageCode) {
      if (!this.currentProject) return false;
      if (this.isAdmin) return true;
      return !this.stageLocked(stageCode) && this.isStageOpen(stageCode, this.currentProject.project);
    },
    isStageOpen(stageCode, project) {
      const order = ['project_info', 'contract_draft', 'contract_stamp', 'contract_delivery', 'fund_claim', 'invoice', 'closure'];
      const idx = order.indexOf(stageCode);
      if (idx <= 0) return true;
      const prev = order[idx - 1];
      return this.stageSubmitted(project, prev);
    },
    stageSubmitted(project, stageCode) {
      if (stageCode === 'project_info') return project.projectInfo.submitted;
      const map = { contract_draft: project.contract.draft, contract_stamp: project.contract.stamp, contract_delivery: project.contract.delivery, fund_claim: project.fundClaim, invoice: project.invoice, closure: project.closure };
      return !!(map[stageCode] && map[stageCode].submitted);
    },
    stageLocked(stageCode) {
      if (!this.currentProject) return true;
      const project = this.currentProject.project;
      if (stageCode === 'project_info') return project.projectInfo.locked;
      const map = { contract_draft: project.contract.draft, contract_stamp: project.contract.stamp, contract_delivery: project.contract.delivery, fund_claim: project.fundClaim, invoice: project.invoice, closure: project.closure };
      return !!(map[stageCode] && map[stageCode].locked);
    },
    async saveProjectInfo() {
      await this.api('/api/projects/' + this.currentProject.project.id + '/base-info', { method: 'PUT', body: JSON.stringify({
        project_name: this.currentProject.project.projectName,
        enterprise_name: this.currentProject.project.enterpriseName,
        project_leader: this.currentProject.project.projectLeader,
        start_time: this.currentProject.project.startTime,
        remark: this.currentProject.project.remark,
        virtual_account_amount: this.currentProject.project.virtualAccountAmount
      }) });
      await this.loadProject();
    },
    async saveStage(stageCode) {
      const projectId = this.currentProject.project.id;
      await this.api('/api/projects/' + projectId + '/modules/' + stageCode, { method: 'PUT', body: JSON.stringify(this.stagePayload(stageCode)) });
      await this.loadProject();
    },
    async submitStage(stageCode) {
      const projectId = this.currentProject.project.id;
      await this.api('/api/projects/' + projectId + '/modules/' + stageCode + '/submit', { method: 'POST', body: '{}' });
      await this.loadProject();
    },
    async resetStage() {
      if (!this.isAdmin || !this.currentProject) return;
      await this.api('/api/projects/' + this.currentProject.project.id + '/reset-stage', { method: 'POST', body: JSON.stringify({ stage_code: this.resetForm.stageCode }) });
      await this.loadProject();
    },
    stagePayload(stageCode) {
      const p = this.currentProject.project;
      if (stageCode === 'project_info') return { project_name: p.projectName, enterprise_name: p.enterpriseName, project_leader: p.projectLeader, start_time: p.startTime, remark: p.remark, virtual_account_amount: p.virtualAccountAmount };
      if (stageCode === 'contract_draft') return { responsible_name: p.contract.draft.responsibleName, date: p.contract.draft.date, remark: p.contract.draft.remark, file_id: p.contract.draft.fileId, file_name: p.contract.draft.fileName };
      if (stageCode === 'contract_stamp') return { responsible_name: p.contract.stamp.responsibleName, date: p.contract.stamp.date, copies: p.contract.stamp.copies, is_stamped: p.contract.stamp.isStamped, is_scanned: p.contract.stamp.isScanned, is_uploaded: p.contract.stamp.isUploaded };
      if (stageCode === 'contract_delivery') return { responsible_name: p.contract.delivery.responsibleName, date: p.contract.delivery.date, tracking_no: p.contract.delivery.trackingNo, customer_confirmed: p.contract.delivery.customerConfirmed, receipt_file_id: p.contract.delivery.receiptFileId, receipt_file_name: p.contract.delivery.receiptFileName, customer_confirm_file_id: p.contract.delivery.customerConfirmFileId, customer_confirm_file_name: p.contract.delivery.customerConfirmFileName };
      if (stageCode === 'fund_claim') return { responsible_name: p.fundClaim.responsibleName, date: p.fundClaim.date, bank_flow_no: p.fundClaim.bankFlowNo, arrival_status: p.fundClaim.arrivalStatus, virtual_amount: p.fundClaim.virtualAmount, screenshot_file_id: p.fundClaim.screenshotFileId, screenshot_file_name: p.fundClaim.screenshotFileName };
      if (stageCode === 'invoice') return { responsible_name: p.invoice.responsibleName, date: p.invoice.date, invoice_type: p.invoice.invoiceType, customer_confirm_status: p.invoice.customerConfirmStatus, send_status: p.invoice.sendStatus, preview_file_id: p.invoice.previewFileId, preview_file_name: p.invoice.previewFileName };
      if (stageCode === 'closure') return { responsible_name: p.closure.responsibleName, date: p.closure.date, closure_status: p.closure.closureStatus, report_file_id: p.closure.reportFileId, report_file_name: p.closure.reportFileName };
      return {};
    },
    async uploadFile(event, stageCode, field) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const base64 = String(reader.result).split(',')[1];
          const saved = await this.api('/api/files/upload', { method: 'POST', body: JSON.stringify({ project_id: this.currentProject.project.id, module_code: stageCode, file_name: file.name, content_type: file.type, content_base64: base64 }) });
          this.applyUploadedFile(stageCode, field, saved);
        } catch (error) { this.message = error.message; }
      };
      reader.readAsDataURL(file);
    },
    applyUploadedFile(stageCode, field, saved) {
      const p = this.currentProject.project;
      const set = (obj, idKey, nameKey) => { obj[idKey] = saved.id; obj[nameKey] = saved.fileName; };
      if (stageCode === 'contract_draft') set(p.contract.draft, 'fileId', 'fileName');
      if (stageCode === 'contract_delivery' && field === 'receipt') set(p.contract.delivery, 'receiptFileId', 'receiptFileName');
      if (stageCode === 'contract_delivery' && field === 'customerConfirm') set(p.contract.delivery, 'customerConfirmFileId', 'customerConfirmFileName');
      if (stageCode === 'fund_claim') set(p.fundClaim, 'screenshotFileId', 'screenshotFileName');
      if (stageCode === 'invoice') set(p.invoice, 'previewFileId', 'previewFileName');
      if (stageCode === 'closure') set(p.closure, 'reportFileId', 'reportFileName');
      this.currentProject.project = p;
    },
    fileUrl(id) { return '/api/files/' + id + '?download=1'; },
    statusDotClass(status) { return status === '已完成' ? 'status-dot dot-success' : status === '逾期' ? 'status-dot dot-danger' : 'status-dot dot-warning'; },
    scrollTo(id) { this.view = id; document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  },
  async mounted() {
    try {
      await this.reloadAll();
      if (this.session.userId) {
        const user = this.users.find(u => u.id === this.session.userId);
        if (user) this.loggedIn = true;
      }
      if (this.currentProject) this.selectedProjectId = this.currentProject.project.id;
    } catch (error) { this.message = error.message; }
  }
}).mount('#app');
</script>
</body>
</html>
